<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>{{ request.user.username }}님의 최근 여정</h1>

    {% for review in reviews %}
        <h3><a href="{% url 'places:detail_place' review.place.id %}">{{ review.place.name }}</a></h3>
        <p>평점: ⭐{{ review.rating|floatformat:1 }}</p>
        <p>내용: {{ review.comment }}</p>
        <p>작성일: {{ review.created_at|date:"Y-m-d" }}</p>
        <a href = "{% url 'places:update_review' review.place.id %}">수정하기</a>
        <a href = "{% url 'places:delete_review' review.place.id %}">삭제하기</a><br>
        <hr>
    {% empty %}
        <p>아직 작성한 리뷰가 없어요.</p>
    {% endfor %}
</body>
</html>
