{% load static %}
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/x-icon"
      href="{% static 'assets/favicon.ico' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}"  />
    <link rel="stylesheet" href="{% static 'assets/css/section/start.css' %}" />
    <title>MOODYA Home</title>
    <!-- 시작 페이지입니다. -->
  </head>
  <body>
    <div id="wrap" class="container">
      <div class="onboarding">
        <div class="onboarding-top">
          <img src="{% static 'assets/img/ic_logo.svg' %}" alt="MOODYA로고" class="logo" />
        </div>


        <div class="onboarding-bottom">
          <a href="{%url 'accounts:signup' %}" class="start-btn">처음 시작해요</a>
          <a href="{%url 'accounts:login' %}" class="login-btn">로그인하기</a>
        </div>
      </div>
    </div>
    <script src="{% static 'assets/js/start.js' %}"></script>
  </body>
</html>
