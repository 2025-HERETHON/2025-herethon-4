<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리뷰 작성하기</title>
</head>
<body>
    <a href="{% url 'journeys:explore' %}">×</a>

    <h2>{{ place.name }}</h2>
    <p>{{ place.get_region_display }}</p>

    <hr>

    <form method="post" action="{% url 'journeys:create_place_review' place.id %}">
        {% csrf_token %}

        <h4>만족도</h4>
        <input type="number" name="rating" min="1" max="5" required>

        <br>

        <h4>감정 기록</h4>
        <select name="emotion" required>
            <option value="" disabled selected>다녀온 후의 감정은 어떠셨나요?</option>
            {% for value, display in emotion_choices %}
                <option value="{{ value }}">{{ display }}</option>
            {% endfor %}
        </select>

        <h4>자세한 여정 기록</h4>
        <textarea name="comment" rows="5" cols="40" placeholder="여정을 기록해 보아요."></textarea>

        <br><br>
        <button type="submit">여정 기록 저장하기</button>
    </form>
</body>
</html>
