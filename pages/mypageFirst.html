<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/section/mypageFirst.css" />
    <title>MOODYA Login</title>
    <!-- 회원가입 단계 중 감정확인 페이지 입니다. -->
  </head>
  <body>
    <div id="wrap" class="container">
      <div class="box">
        <div class="top-box">
          <a href="mypage.html" id="backBtn">
            <img src="../assets/img/backBtn.svg" alt="backBtn" />
          </a>
        </div>
        <div class="intro-ment">
          <p id="first-ment">오늘 기분 어때요?</p>
          <p id="second-ment">당신의 감정에 맞는 완벽한 장소를 찾아드릴게요</p>
        </div>
        <!-- 감정선택 -->
        <form action="mypage.html" method="get" id="settingForm">
          <div class="click-wrap">
            <label class="click-box">
              <input type="radio" name="emotion" value="불안해요" hidden />
              <div class="emoji">😰</div>
              <div class="descript-box">
                <p class="state">불안해요</p>
                <p class="descript">마음이 복잡하고 진정이 필요해요</p>
              </div>
            </label>
            <label class="click-box">
              <input type="radio" name="emotion" value="설레요" hidden />
              <div class="emoji">😊</div>
              <div class="descript-box">
                <p class="state">설레요</p>
                <p class="descript">새로운 경험을 해보고 싶어요</p>
              </div>
            </label>
            <label class="click-box">
              <input type="radio" name="emotion" value="활기차요" hidden />
              <div class="emoji">😎</div>
              <div class="descript-box">
                <p class="state">활기차요</p>
                <p class="descript">에너지가 넘치고 활동적이에요</p>
              </div>
            </label>
            <label class="click-box">
              <input type="radio" name="emotion" value="궁금해요" hidden />
              <div class="emoji">🤔</div>
              <div class="descript-box">
                <p class="state">궁금해요</p>
                <p class="descript">새로운 경험이 기대돼요</p>
              </div>
            </label>
            <label class="click-box">
              <input type="radio" name="emotion" value="평온해요" hidden />
              <div class="emoji">😌</div>
              <div class="descript-box">
                <p class="state">평온해요</p>
                <p class="descript">조용한 시간이 필요해요</p>
              </div>
            </label>
          </div>
          <button class="common-btn">다음</button>
        </form>
      </div>
    </div>
    <script src="../assets/js/mysetting.js"></script>
  </body>
</html>
