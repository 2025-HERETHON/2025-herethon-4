<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../assets/css/style.css">
   <link rel="stylesheet" href="../assets/css/section/mypage.css" />
   <title>MOODYA MyPage</title>
</head>
<body>
   <div id="wrap" class="container">
      <div class="box">
         <div class="mypage_top">
            <div class="top_left">
               <img src="../assets/img/img_hello.svg" alt="img_hello">
            </div>
            <div class="top_right">
               <h2>마이페이지</h2>
               <p><span>MOODYA</span>와 함께한 지 <span class="day">15</span>일째</p>
            </div>
         </div>
         <div class="my_settings">
            <h3>내 설정</h3>
            <div class="setting_first">
               <h3>현재 선호 감정</h3>
               <p>추천에 반영되는 기본 감정</p>
               <div class="setting_bottom">
                  <div class="yellow_tag">불안해요</div>
                  <div class="change">변경</div>
               </div>
            </div>
            <hr />
            <div class="setting">
               <h3>혼자 외출 레벨</h3>
               <p>편안한 정도에 따른 장소 추천</p>
               <div class="setting_bottom">
                  <div class="yellow_tag">초급</div>
                  <div class="change">변경</div>
               </div>
            </div>
            <hr />
            <div class="setting">
               <h3>선호 지역</h3>
               <p>주로 가고 싶은 서울 권역</p>
               <div class="setting_bottom">
                  <div class="yellow_tag">서북권</div>
                  <div class="change">변경</div>
               </div>
            </div>
         </div>
         <div class="save_places">
            <h3>저장한 장소들</h3>
            <div class="no_place">
               <div class="map_img">🗺️</div>
               <p class="noplace">아직 저장된 장소가 없어요</p>
               <p class="letssave">여정을 완료하고 마음에 든 장소를 저장해보세요!</p>
            </div>
            <div class="yes_places">
               <div class="place_info">
                  <div class="place_name">연남동 연트럴파크</div>
                  <div class="visited"><span>7/7</span> 방문 코스</div>
               </div>
               <div class="place_info">
                  <div class="place_name">북촌 한옥마을</div>
                  <div class="visited"><span>7/5</span> 방문 코스</div>
               </div>
            </div>
         </div>
         <button class="logout">로그아웃하기</button>
         <div class="bottom_nav">
            <div class="nav_item">
               <img src="../assets/img/ic_home.svg" alt="ic_home">
               <span class="unselected">홈</span>
            </div>
            <div class="nav_item">
               <img src="../assets/img/ic_search.svg" alt="ic_search">
               <span class="unselected">탐험</span>
            </div>
            <div class="nav_item">
               <img src="../assets/img/ic_journey.svg" alt="ic_journey">
               <span class="unselected">여정</span>
            </div>
            <div class="nav_item">
               <img src="../assets/img/ic_mypage_selected.svg" alt="ic_mypage">
               <span class="selected">마이</span>
            </div>
         </div>
      </div>
   </div>
</body>
</html>
