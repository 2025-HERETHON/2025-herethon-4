<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/section/home.css" />
    <title>MOODYA Home</title>
  </head>
  <body>
    <div id="wrap" class="container">
      <div class="box">
        <div class="hello">
          <div class="hello_top">
            <div class="hello_text">
              <h2>안녕하세요!</h2>
              <p>오늘은 어떤 여정을 떠나볼까요?</p>
            </div>
            <div class="hello_img">
              <img src="../assets/img/img_hello.svg" alt="img_hello" />
            </div>
          </div>
          <div class="hello_bottom">
            <button>+ 새로운 여정 시작하기</button>
          </div>
        </div>
        <div class="feellike">
          <div class="feellike_left">
            <h3>오늘의 기분은?</h3>
            <p>감정을 체크하고 맞춤 추천을 받아보세요</p>
          </div>
          <div class="feellike_right"></div>
        </div>
        <div class="suggest">
          <div class="suggest_text">
            <h3>추천 장소</h3>
            <div class="more">
              <div class="more_text">더보기</div>
              <div class="more_icon">
                <img
                  src="../assets/img/ic_rightarrow.svg"
                  alt="ic_rightarrow"
                />
              </div>
            </div>
          </div>
          <div class="suggest_list">
            <div class="suggest_item">
              <div class="suggest_img">
                <img src="../assets/img/ic_coffee.png" alt="ic_coffee" />
              </div>
              <div class="course_name">성수동 카페거리</div>
              <div class="purple_tag">카페 투어</div>
            </div>
            <div class="suggest_item">
              <div class="suggest_img">
                <img src="../assets/img/ic_tree.png" alt="ic_tree" />
              </div>
              <div class="course_name">서울숲 산책로</div>
              <div class="purple_tag">자연힐링</div>
            </div>
          </div>
        </div>
        <div class="recents">
          <h3>최근 여정</h3>
          <div class="recent">
            <div class="recent_top">
              <div class="blue_tag">평온해요</div>
              <div class="day_after">2일 전</div>
            </div>
            <div class="recent_middle">
              <h3>북촌 한옥마을 산책로</h3>
              <div class="region">중부권</div>
            </div>
            <div class="recent_bottom">
              <div class="review">
                <div class="review_img">
                  <img src="../assets/img/ic_star.svg" alt="ic_star" />
                </div>
                <div class="review_num">4.5</div>
              </div>
              <div class="review_content">완벽한 힐링이었어요</div>
            </div>
          </div>
          <div class="recent">
            <div class="recent_top">
              <div class="blue_tag">평온해요</div>
              <div class="day_after">2일 전</div>
            </div>
            <div class="recent_middle">
              <h3>청계천</h3>
              <div class="region">중부권</div>
            </div>
            <div class="recent_bottom">
              <div class="review">
                <div class="review_img">
                  <img src="../assets/img/ic_star.svg" alt="ic_star" />
                </div>
                <div class="review_num">4.5</div>
              </div>
              <div class="review_content">
                물멍 때리니깐 마음이 안정되었어요.
              </div>
            </div>
          </div>
        </div>
        <!-- 네비탭 -->
        <div class="bottom_nav">
          <a href="home.html" class="nav_item">
            <img
              src="../assets/img/ic_home_selected.svg"
              alt="ic_home_selected"
            />
            <span class="selected">홈</span>
          </a>
          <a href="suggestCourse.html" class="nav_item">
            <img src="../assets/img/ic_search.svg" alt="ic_search" />
            <span class="unselected">탐험</span>
          </a>
          <!-- 여정 추가예정 -->
          <a href="routeRecord.html" class="nav_item">
            <img src="../assets/img/ic_journey.svg" alt="ic_journey" />
            <span class="unselected">여정</span>
          </a>
          <a href="mypage.html" class="nav_item">
            <img src="../assets/img/ic_mypage.svg" alt="ic_mypage" />
            <span class="unselected">마이</span>
          </a>
        </div>
      </div>
    </div>
    <script src="../assets/js/home.js"></script>
  </body>
</html>
