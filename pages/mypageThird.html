<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/section/mypageThird.css" />
    <title>MOODYA Sign Up</title>
    <!--회원가입 단계 중 지역 선택 페이지입니다. -->
  </head>
  <body>
    <div id="wrap" class="container">
      <div class="box">
        <div class="top-box">
          <a href="mypage.html" id="backBtn">
            <img src="../assets/img/backBtn.svg" alt="backBtn" />
          </a>
        </div>
        <div class="intro-ment">
          <p id="first-ment">오늘, 어디에서 나를 쉬게 해줄까요?</p>
          <p id="second-ment">
            지역을 선택하면 당신만을 위한 코스를 추천해드릴게요.
          </p>
        </div>

        <!-- 지역선택 확인 -->
        <form action="mypage.html" method="get" id="settingForm">
          <div class="click-wrap">
            <label class="click-box">
              <input type="radio" name="region" value="서북권" hidden />
              <div class="descript-box">
                <p class="region">서북권</p>
                <p class="descript">홍대, 망원,<br />연남, 상수</p>
                <div class="check-btn">
                  <img
                    src="../assets/img/none-checkBtn.svg"
                    alt="check-btn"
                    class="checkImage"
                  />
                </div>
              </div>
            </label>
            <label class="click-box">
              <input type="radio" name="region" value="동북권" hidden />
              <div class="descript-box">
                <p class="region">동북권</p>
                <p class="descript">성수, 서울숲,<br />건대</p>
                <div class="check-btn">
                  <img
                    src="../assets/img/none-checkBtn.svg"
                    alt="check-btn"
                    class="checkImage"
                  />
                </div>
              </div>
            </label>
            <label class="click-box">
              <input type="radio" name="region" value="서남권" hidden />
              <div class="descript-box">
                <p class="region">서남권</p>
                <p class="descript">여의도, 합정,<br />신촌, 목동</p>
                <div class="check-btn">
                  <img
                    src="../assets/img/none-checkBtn.svg"
                    alt="check-btn"
                    class="checkImage"
                  />
                </div>
              </div>
            </label>
            <label class="click-box">
              <input type="radio" name="region" value="동남권" hidden />
              <div class="descript-box">
                <p class="region">동남권</p>
                <p class="descript">강남, 삼성,<br />청담</p>
                <div class="check-btn">
                  <img
                    src="../assets/img/none-checkBtn.svg"
                    alt="check-btn"
                    class="checkImage"
                  />
                </div>
              </div>
            </label>
            <label class="click-box">
              <input type="radio" name="region" value="중부권" hidden />
              <div class="descript-box">
                <p class="region">중부권</p>
                <p class="descript">종로, 서촌,<br />북촌, 혜화</p>
                <div class="check-btn">
                  <img
                    src="../assets/img/none-checkBtn.svg"
                    alt="check-btn"
                    class="checkImage"
                  />
                </div>
              </div>
            </label>
          </div>
          <button class="common-btn">추천받기</button>
        </form>
      </div>
    </div>
    <script src="../assets/js/mysetting.js"></script>
  </body>
</html>
